# NES-380: Railway deploy via GitHub Actions (manual fallback)
#
# Use this when Railway's native GitHub webhook is broken.
# Trigger manually from Actions tab → "Deploy to Railway" → "Run workflow".
#
# Railway's webhook is the primary deploy mechanism (faster, shows commit
# SHAs in dashboard, integrates with rollback UI). This workflow is the
# emergency fallback only.
#
# Required secrets:
#   RAILWAY_TOKEN — Railway API token (railway.com → Account Settings → Tokens)
#
# Required variables (Settings → Variables, not Secrets):
#   RAILWAY_SERVICE_ID — The web service ID (Railway dashboard → service → Settings → Service ID)

name: Deploy to Railway

on:
  workflow_dispatch:

# Cancel in-progress deploys when a new one is triggered
concurrency:
  group: deploy-railway
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service ${{ vars.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
