{% if style == 'square' %}
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <a href="/?utm_source=widget&amp;utm_medium=badge&amp;utm_content=fallback-square">
    <rect width="120" height="120" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

    {# Logo mark #}
    <g transform="translate(44, 20)">
      <rect width="10" height="28" rx="2" fill="#0B1D3A" transform="skewX(-8)"/>
      <rect x="8" width="10" height="28" rx="2" fill="#0B1D3A" opacity="0.6" transform="skewX(-8)"/>
    </g>

    {# CTA text #}
    <text x="60" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#0B1D3A">Evaluate on</text>
    <text x="60" y="88" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#0B1D3A">NestCheck</text>

    {# URL #}
    <text x="60" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#94A3B8">nestcheck.org</text>
  </a>
</svg>
{% else %}
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <a href="/?utm_source=widget&amp;utm_medium=badge&amp;utm_content=fallback-banner">
    <rect width="200" height="60" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

    {# Logo mark — two skewed rectangles #}
    <g transform="translate(12, 15)">
      <rect width="8" height="22" rx="1.5" fill="#0B1D3A" transform="skewX(-8)"/>
      <rect x="6" width="8" height="22" rx="1.5" fill="#0B1D3A" opacity="0.6" transform="skewX(-8)"/>
    </g>

    {# CTA text #}
    <text x="40" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0B1D3A">Evaluate on NestCheck</text>

    {# Subtitle #}
    <text x="40" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#94A3B8">Free property health report</text>

    {# URL #}
    <text x="188" y="50" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#94A3B8">nestcheck.org</text>
  </a>
</svg>
{% endif %}
