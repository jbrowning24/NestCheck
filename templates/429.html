{% extends "_base.html" %}

{% block title %}NestCheck — Too Many Requests{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/error-page.css') }}?v={{ asset_v }}">
{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-icon">
    <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="32" cy="32" r="24"/>
      <polyline points="32,16 32,32 42,38"/>
    </svg>
  </div>
  <h1>429</h1>
  <p>You've made too many requests. Please wait a few minutes and try again.</p>
  <a href="/" class="error-cta">Back to NestCheck</a>
</div>
{% endblock %}
